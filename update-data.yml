name: Dalio Sentinel Auto-Update

on:
  schedule:
    # Run automatically every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab
  push:
    paths-ignore:
      - 'local_data.json' # Prevent recursive trigger when the action itself commits data
    branches:
      - main
      - master

permissions:
  contents: write # Need this permission to commit back to the repository

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Data Fetcher
        run: |
          python fetch_data.py
          
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add local_data.json
          git commit -m "Auto-update macroscopic data [skip ci]" || echo "No changes to commit"
          git push
